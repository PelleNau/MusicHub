name: Governance Check

on:
  pull_request:
  push:
    branches:
      - "main"
      - "codex/figma-capture-mode"
      - "codex/**"

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run governance check
        run: node scripts/check-governance.mjs
